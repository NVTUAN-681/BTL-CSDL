
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  NHA_CUNG_CAP {
    int MaNCC PK
    varchar TenNCC
    varchar DiaChi
    varchar DienThoai
    varchar Email
    varchar QuocGia
    bit TrangThai
  }
  NGUYEN_VAT_LIEU {
    int MaNVL PK
    varchar TenNVL
    varchar DonViTinh
    decimal GiaMua
    int SoLuongTon
    int MucTonToiThieu
    varchar MoTa
  }
  DON_DAT_HANG_NCC {
    int MaDonNCC PK
    int MaNCC FK
    date NgayDat
    date NgayGiaoHan
    varchar TrangThai
    decimal TongGiaTri
    varchar GhiChu
  }
  CHI_TIET_DON_NCC {
    int MaCTDonNCC PK
    int MaDonNCC FK
    int MaNVL FK
    int SoLuong
    decimal DonGia
    decimal ThanhTien
  }
  KHO {
    int MaKho PK
    varchar TenKho
    varchar DiaChi
    varchar LoaiKho
    float SucChua
    varchar NguoiPhuTrach
  }
  NHAP_KHO {
    int MaNhapKho PK
    int MaDonNCC FK
    int MaKho FK
    date NgayNhap
    varchar NguoiNhap
    varchar GhiChu
  }
  XUAT_KHO {
    int MaXuatKho PK
    int MaKho FK
    int MaDonXuat FK
    date NgayXuat
    varchar NguoiXuat
    varchar GhiChu
  }
  TON_KHO {
    int MaTonKho PK
    int MaKho FK
    int MaNVL FK
    int SoLuongTon
    date NgayCapNhat
  }
  KHACH_HANG {
    int MaKH PK
    varchar TenKH
    varchar DiaChi
    varchar DienThoai
    varchar Email
    varchar LoaiKH
  }
  DON_XUAT_HANG {
    int MaDonXuat PK
    int MaKH FK
    date NgayDat
    date NgayGiao
    varchar TrangThai
    decimal TongGiaTri
    varchar DiaChiGiao
  }
  CHI_TIET_DON_XUAT {
    int MaCTDonXuat PK
    int MaDonXuat FK
    int MaNVL FK
    int SoLuong
    decimal DonGia
    decimal ThanhTien
  }
  VAN_CHUYEN {
    int MaVanChuyen PK
    int MaDonXuat FK
    varchar MaSoVanDon
    varchar NhaVanChuyen
    date NgayXuatPhat
    date NgayDuKien
    varchar TrangThai
    varchar GhiChu
  }

  NHA_CUNG_CAP ||--o{ DON_DAT_HANG_NCC : "cung cap"
  DON_DAT_HANG_NCC ||--|{ CHI_TIET_DON_NCC : "co"
  NGUYEN_VAT_LIEU ||--o{ CHI_TIET_DON_NCC : "duoc dat"
  DON_DAT_HANG_NCC ||--o{ NHAP_KHO : "duoc nhap"
  KHO ||--o{ NHAP_KHO : "tiep nhan"
  KHO ||--o{ XUAT_KHO : "cung cap"
  KHO ||--o{ TON_KHO : "luu tru"
  NGUYEN_VAT_LIEU ||--o{ TON_KHO : "duoc ton"
  DON_XUAT_HANG ||--o{ XUAT_KHO : "tao"
  KHACH_HANG ||--o{ DON_XUAT_HANG : "dat"
  DON_XUAT_HANG ||--|{ CHI_TIET_DON_XUAT : "co"
  NGUYEN_VAT_LIEU ||--o{ CHI_TIET_DON_XUAT : "xuat"
  DON_XUAT_HANG ||--o{ VAN_CHUYEN : "duoc van chuyen"
`);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
